<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 920 580" font-family="Helvetica, Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#333"/>
    </marker>
    <marker id="arrowdash" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#666"/>
    </marker>
  </defs>

  <!-- Stage labels along top -->
  <text x="90" y="22" font-size="12" font-weight="bold" fill="#555" text-anchor="middle">INPUTS</text>
  <text x="320" y="22" font-size="12" font-weight="bold" fill="#555" text-anchor="middle">SCORING (automated proxies)</text>
  <text x="600" y="22" font-size="12" font-weight="bold" fill="#555" text-anchor="middle">COMPOSITE</text>
  <text x="820" y="22" font-size="12" font-weight="bold" fill="#555" text-anchor="middle">DECISION</text>

  <!-- Inputs column -->
  <rect x="20" y="60" width="140" height="60" rx="6" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="84" font-size="13" font-weight="bold" text-anchor="middle">Candidate dataset</text>
  <text x="90" y="103" font-size="11" text-anchor="middle" fill="#444">D (with documentation)</text>

  <rect x="20" y="200" width="140" height="60" rx="6" fill="#f0f0f0" stroke="#333" stroke-width="1.5"/>
  <text x="90" y="224" font-size="13" font-weight="bold" text-anchor="middle">Application context</text>
  <text x="90" y="243" font-size="11" text-anchor="middle" fill="#444">a = DW, ML, or LLM</text>

  <!-- Three scoring boxes -->
  <rect x="220" y="50" width="200" height="100" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="320" y="71" font-size="13" font-weight="bold" text-anchor="middle">Quality dimensions</text>
  <text x="320" y="89" font-size="10" text-anchor="middle" fill="#444">8 dimensions (Table I)</text>
  <text x="320" y="105" font-size="10" text-anchor="middle" fill="#444">application-conditional</text>
  <text x="320" y="120" font-size="10" text-anchor="middle" fill="#444">weights w(a)</text>
  <text x="320" y="139" font-size="10" font-style="italic" text-anchor="middle" fill="#666">Scored 0 to 1 per dimension</text>

  <rect x="220" y="180" width="200" height="100" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="320" y="201" font-size="13" font-weight="bold" text-anchor="middle">Safety sub-rubric</text>
  <text x="320" y="218" font-size="10" text-anchor="middle" fill="#444">6 sub-dimensions (Table II)</text>
  <text x="320" y="235" font-size="10" text-anchor="middle" fill="#444">CO: poisoning, decay,</text>
  <text x="320" y="249" font-size="10" text-anchor="middle" fill="#444">harm-content, adv. provenance</text>
  <text x="320" y="265" font-size="10" text-anchor="middle" fill="#444">PS: physical-harm, edge cases</text>

  <rect x="220" y="310" width="200" height="100" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="320" y="331" font-size="13" font-weight="bold" text-anchor="middle">Rights sub-rubric</text>
  <text x="320" y="348" font-size="10" text-anchor="middle" fill="#444">5 sub-dimensions (Table III)</text>
  <text x="320" y="364" font-size="10" text-anchor="middle" fill="#444">demographic representation,</text>
  <text x="320" y="378" font-size="10" text-anchor="middle" fill="#444">consent, re-identification,</text>
  <text x="320" y="392" font-size="10" text-anchor="middle" fill="#444">inferential harm, contestability</text>

  <!-- Tools callout below scoring -->
  <rect x="220" y="440" width="200" height="76" rx="4" fill="#fafafa" stroke="#888" stroke-dasharray="3,3"/>
  <text x="320" y="458" font-size="10" font-weight="bold" text-anchor="middle" fill="#555">Automated proxy tools</text>
  <text x="320" y="475" font-size="9" text-anchor="middle" fill="#555">Detoxify (harm content)</text>
  <text x="320" y="488" font-size="9" text-anchor="middle" fill="#555">k-anonymity (re-identification)</text>
  <text x="320" y="501" font-size="9" text-anchor="middle" fill="#555">mutual info (inferential harm)</text>
  <text x="320" y="513" font-size="9" text-anchor="middle" fill="#555">half-life constants (factual decay)</text>

  <!-- Composite tuple box -->
  <rect x="470" y="170" width="220" height="200" rx="6" fill="#fff" stroke="#333" stroke-width="2"/>
  <text x="580" y="194" font-size="13" font-weight="bold" text-anchor="middle">Fitness tuple</text>
  <text x="580" y="211" font-size="11" text-anchor="middle" fill="#444">(Section IV-E)</text>
  <line x1="490" y1="221" x2="670" y2="221" stroke="#999" stroke-width="0.5"/>
  <text x="580" y="248" font-size="15" font-weight="bold" text-anchor="middle">F(D, a) = (Q, S, R)</text>
  <text x="580" y="278" font-size="10" text-anchor="middle" fill="#444">Q = weighted mean of</text>
  <text x="580" y="291" font-size="10" text-anchor="middle" fill="#444">quality dimensions (Table I)</text>
  <text x="580" y="311" font-size="10" text-anchor="middle" fill="#444">S = unweighted mean (CO + PS)</text>
  <text x="580" y="331" font-size="10" text-anchor="middle" fill="#444">R = unweighted mean (rights)</text>
  <text x="580" y="355" font-size="10" font-style="italic" text-anchor="middle" fill="#666">N/A sub-dims removed from</text>
  <text x="580" y="367" font-size="10" font-style="italic" text-anchor="middle" fill="#666">denominator, not zeroed</text>

  <!-- Decision box -->
  <rect x="750" y="170" width="150" height="200" rx="6" fill="#fff" stroke="#333" stroke-width="1.5"/>
  <text x="825" y="194" font-size="13" font-weight="bold" text-anchor="middle">Threshold rule</text>
  <text x="825" y="217" font-size="11" text-anchor="middle" fill="#444">Per-axis,</text>
  <text x="825" y="233" font-size="11" text-anchor="middle" fill="#444">set by deployer</text>
  <line x1="765" y1="248" x2="885" y2="248" stroke="#999" stroke-width="0.5"/>
  <text x="825" y="268" font-size="10" text-anchor="middle" fill="#444">Example (high-stakes):</text>
  <text x="825" y="288" font-size="11" text-anchor="middle" fill="#333">Q at least 0.7</text>
  <text x="825" y="303" font-size="11" text-anchor="middle" fill="#333">S at most 0.2</text>
  <text x="825" y="318" font-size="11" text-anchor="middle" fill="#333">R at most 0.2</text>
  <text x="825" y="346" font-size="10" font-style="italic" text-anchor="middle" fill="#666">Store fitness tuple</text>
  <text x="825" y="359" font-size="10" font-style="italic" text-anchor="middle" fill="#666">with dataset metadata</text>

  <!-- Lifecycle / re-assessment trigger box -->
  <rect x="470" y="440" width="430" height="76" rx="6" fill="#f5f5f5" stroke="#333" stroke-width="1.5"/>
  <text x="685" y="461" font-size="13" font-weight="bold" text-anchor="middle">Re-assessment triggers (Table IV)</text>
  <text x="685" y="481" font-size="10" text-anchor="middle" fill="#444">application boundary crossing  |  deployment context shift  |  temporal threshold</text>
  <text x="685" y="495" font-size="10" text-anchor="middle" fill="#444">regulatory event  |  composition change</text>
  <text x="685" y="509" font-size="10" font-style="italic" text-anchor="middle" fill="#666">When fired: re-score affected sub-dimensions</text>

  <!-- Arrows: dataset to all three scoring boxes -->
  <path d="M 160 90 L 215 100" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 160 90 L 215 220" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 160 90 L 215 340" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow: application context selects weights (dashed because it conditions, not flows data) -->
  <path d="M 160 230 L 215 130" stroke="#333" stroke-width="1.5" fill="none" stroke-dasharray="4,3" marker-end="url(#arrow)"/>
  <text x="200" y="170" font-size="9" font-style="italic" fill="#666">Selects w(a)</text>

  <!-- Tools to scoring boxes (dashed up to all three) -->
  <path d="M 320 440 L 320 415" stroke="#888" stroke-width="1" fill="none" stroke-dasharray="3,3" marker-end="url(#arrowdash)"/>

  <!-- Arrows: scoring to composite -->
  <path d="M 420 100 L 465 220" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 420 230 L 465 260" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
  <path d="M 420 360 L 465 300" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Arrow: composite to decision -->
  <path d="M 690 270 L 748 270" stroke="#333" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>

  <!-- Lifecycle feedback arrow: drops below Tools box, then runs left, then up to inputs -->
  <path d="M 470 510 L 470 545 L 15 545 L 15 230 L 18 230" stroke="#666" stroke-width="1.5" fill="none" stroke-dasharray="5,3" marker-end="url(#arrow)"/>
  <text x="325" y="562" font-size="10" font-style="italic" fill="#666">Re-assess on trigger</text>
</svg>
